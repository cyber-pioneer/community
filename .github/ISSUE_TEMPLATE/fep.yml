name: "📋 FEP (FlagOS Enhancement Proposal)"
description: 提出一个 FlagOS Feature 增强提案
title: "[FEP][模块名] Feature 简述"
labels: ["FEP"]

body:
  - type: markdown
    attributes:
      value: |
        ## FlagOS Enhancement Proposal

        请参考 [FEP 流程文档](../../docs/fep-process.md) 和 [已有 FEP](https://github.com/FlagOS-AI/community/issues?q=label%3AFEP+sort%3Aupdated-desc) 了解规范。

  - type: input
    id: owner
    attributes:
      label: Owner
      description: 该 Feature 的负责人（GitHub 用户名）
      placeholder: "@xxx"
    validations:
      required: true

  - type: dropdown
    id: module
    attributes:
      label: 模块
      description: 该 Feature 所属模块（跨模块请选"跨模块"）
      options:
        - FlagGems
        - FlagTree
        - FlagCX
        - FlagScale
        - FlagRelease
        - KernelGen
        - FlagPerf
        - FlagAttention
        - FlagOS-Robo
        - FlagOS Skills
        - 跨模块
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: 优先级
      description: |
        P0 Must Have — 版本核心卖点，做不完则延期
        P1 Should Have — 重要但非核心，做不完降级到下版本
        P2 Nice to Have — 锦上添花，Freeze 时优先砍掉
      options:
        - P0 Must Have
        - P1 Should Have
        - P2 Nice to Have
    validations:
      required: true

  - type: input
    id: target-version
    attributes:
      label: 目标版本
      description: 该 Feature 计划发布的 FlagOS 版本
      placeholder: "FlagOS 2.1"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: 描述
      description: 做什么 + 为什么做
      placeholder: |
        ### 做什么
        简要描述 Feature 的内容。

        ### 为什么做
        说明动机和背景。
    validations:
      required: true

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: 验收标准
      description: Feature 完成的判定条件（请使用 checklist 格式）
      placeholder: |
        - [ ] 标准 1
        - [ ] 标准 2
        - [ ] 标准 3
    validations:
      required: true

  - type: textarea
    id: related-prs
    attributes:
      label: 关联 PR
      description: 实现该 Feature 需要的 PR 列表（可后续补充）
      placeholder: |
        - [ ] flagos-ai/FlagGems#xxx — 说明
        - [ ] flagos-ai/FlagTree#xxx — 说明
    validations:
      required: false

  - type: textarea
    id: test-plan
    attributes:
      label: 测试计划
      description: 描述如何验证该 Feature
      placeholder: |
        - 功能验证：...
        - 性能验证：...
        - 芯片兼容性验证：...
    validations:
      required: true

  - type: textarea
    id: cross-module-deps
    attributes:
      label: 跨模块依赖（如有）
      description: 列出依赖的其他模块/Feature，以及阻塞关系
      placeholder: |
        依赖 FlagTree 的 xxx 功能先合入
    validations:
      required: false
